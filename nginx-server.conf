# ========================================
# Nginx Configuration for Velozz (Server Host)
# ========================================
# This file should be copied to: /etc/nginx/sites-available/velozz
# Then symlinked to: /etc/nginx/sites-enabled/velozz
#
# IMPORTANT: velozz.digital is hosted on Hostinger (WordPress)
# This config handles ONLY subdomains on Contabo VPS:
# - app.velozz.digital (Admin Panel)
# - *.velozz.digital (Tenant Panels)
# - ws.velozz.digital (WebSocket Server - Reverb)
# ========================================

# Upstream para o container nginx (porta 8080 do host → porta 80 do container)
upstream app {
    server 127.0.0.1:8080;
}

# Rotas de embed (formulários e widgets) devem permitir iframe de qualquer origem.
# String vazia = nginx não envia o header X-Frame-Options.
map $request_uri $x_frame_options_embed {
    ~^/(embed|forms)/   "";
    default             "SAMEORIGIN";
}

# Upstream para Reverb WebSocket (container porta 8081)
upstream reverb {
    server 127.0.0.1:8081;
}

# Redirect HTTP to HTTPS (subdomains only)
server {
    listen 80;
    server_name app.velozz.digital *.velozz.digital ws.velozz.digital;

    # Let's Encrypt ACME challenge (served from host filesystem)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/velozz/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Admin Panel (app.velozz.digital)
server {
    listen 443 ssl http2;
    server_name app.velozz.digital;

    # SSL Configuration (Let's Encrypt wildcard certificate)
    ssl_certificate /etc/letsencrypt/live/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/velozz-app-access.log;
    error_log /var/log/nginx/velozz-app-error.log;

    # Proxy all requests to the container nginx
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_buffer_size 128k;
        proxy_buffers 256 16k;
        proxy_busy_buffers_size 256k;
    }
}

# Tenant Subdomains (*.velozz.digital except app and ws)
server {
    listen 443 ssl http2;
    server_name ~^(?!app\.|ws\.)(?<subdomain>.+)\.velozz\.digital$;

    # SSL Configuration (Wildcard certificate)
    ssl_certificate /etc/letsencrypt/live/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    # X-Frame-Options é omitido nas rotas /embed/ e /forms/ para permitir iframe
    add_header X-Frame-Options $x_frame_options_embed always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/velozz-tenants-access.log;
    error_log /var/log/nginx/velozz-tenants-error.log;

    # Proxy all requests to the container nginx
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_buffer_size 128k;
        proxy_buffers 256 16k;
        proxy_busy_buffers_size 256k;
    }
}

# Reverb WebSocket Server (ws.velozz.digital)
server {
    listen 443 ssl http2;
    server_name ws.velozz.digital;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Logs
    access_log /var/log/nginx/velozz-reverb-access.log;
    error_log /var/log/nginx/velozz-reverb-error.log;

    # Proxy to Reverb WebSocket server
    location / {
        proxy_pass http://reverb;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket specific settings (long timeouts)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;

        # Disable buffering for WebSockets
        proxy_buffering off;
    }
}
