# ========================================
# Nginx Configuration for Velozz (Server Host)
# ========================================
# This file should be copied to: /etc/nginx/sites-available/velozz
# Then symlinked to: /etc/nginx/sites-enabled/velozz
#
# IMPORTANT: velozz.digital is hosted on Hostinger (WordPress)
# This config handles ONLY subdomains on Contabo VPS:
# - app.velozz.digital (Admin Panel)
# - *.velozz.digital (Tenant Panels)
# - ws.velozz.digital (WebSocket Server - Reverb)
# ========================================

# Upstream para PHP-FPM (container na porta 9000)
upstream php-fpm {
    server 127.0.0.1:9000;
}

# Upstream para Reverb WebSocket (container na porta 8080)
upstream reverb {
    server 127.0.0.1:8080;
}

# Redirect HTTP to HTTPS (subdomains only)
server {
    listen 80;
    server_name app.velozz.digital *.velozz.digital ws.velozz.digital;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/velozz/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Admin Panel (app.velozz.digital)
server {
    listen 443 ssl http2;
    server_name app.velozz.digital;

    # Nginx reads from host filesystem
    root /var/www/velozz/public;
    index index.php;

    # SSL Configuration (Let's Encrypt wildcard certificate)
    ssl_certificate /etc/letsencrypt/live/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    charset utf-8;

    # Logs
    access_log /var/log/nginx/velozz-app-access.log;
    error_log /var/log/nginx/velozz-app-error.log;

    # Livewire routes must always go to PHP (not static files)
    location ~ ^/livewire {
        try_files /livewire-doesnt-exist-so-goes-to-index /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP-FPM via FastCGI (proxy to container)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;

        # Convert path: /var/www/velozz -> /var/www/html (container path)
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;

        # Pass correct host information
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS on;

        include fastcgi_params;

        # Ensure cookies are passed (critical for Livewire temporary uploads)
        fastcgi_param HTTP_COOKIE $http_cookie;
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;

        # Buffer settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # CORS for Filament assets (fonts, build, js)
    location ~ ^/(fonts|build|js)/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

        # Handle OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        access_log off;
    }
}

