# Reverb WebSocket Server (ws.velozz.digital)
server {
    listen 443 ssl http2;
    server_name ws.velozz.digital;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Logs
    access_log /var/log/nginx/velozz-reverb-access.log;
    error_log /var/log/nginx/velozz-reverb-error.log;

    # Proxy to Reverb WebSocket server
    location / {
        proxy_pass http://reverb;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket specific settings (long timeouts)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;

        # Disable buffering for WebSockets
        proxy_buffering off;
    }
}
