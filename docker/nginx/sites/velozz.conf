# ========================================
# IMPORTANT: velozz.digital is hosted on Hostinger (WordPress)
# This Nginx configuration handles ONLY subdomains on Contabo VPS:
# - app.velozz.digital (Admin Panel)
# - *.velozz.digital (Tenant Panels)
# - ws.velozz.digital (WebSocket Server)
# ========================================

# Redirect HTTP to HTTPS (for subdomains only)
server {
    listen 80;
    server_name app.velozz.digital *.velozz.digital ws.velozz.digital;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Admin Panel (app.velozz.digital)
server {
    listen 443 ssl http2;
    server_name app.velozz.digital;
    root /var/www/public;
    index index.php;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    charset utf-8;

    # Rate limiting for admin panel
    limit_req zone=general_limit burst=20 nodelay;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # Do not buffer request body in nginx — prevents buffer contamination
        # when PHP-FPM temporarily fails and request body leaks into next response
        fastcgi_request_buffering off;

        # Larger buffers for Livewire/Filament responses
        fastcgi_buffers 32 16k;
        fastcgi_buffer_size 64k;
        fastcgi_busy_buffers_size 128k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Tenant Subdomains (*.velozz.digital except app)
server {
    listen 443 ssl http2;
    server_name ~^(?!app\.)(?<subdomain>.+)\.velozz\.digital$;
    root /var/www/public;
    index index.php;

    # SSL Configuration (Wildcard certificate)
    ssl_certificate /etc/nginx/ssl/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    #add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors *";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    charset utf-8;

    # Rate limiting for tenant panels
    limit_req zone=general_limit burst=30 nodelay;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # Do not buffer request body in nginx — prevents buffer contamination
        # when PHP-FPM temporarily fails and request body leaks into next response
        fastcgi_request_buffering off;

        # Larger buffers for Livewire/Filament responses
        fastcgi_buffers 32 16k;
        fastcgi_buffer_size 64k;
        fastcgi_busy_buffers_size 128k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Reverb WebSocket Server
server {
    listen 443 ssl http2;
    server_name ws.velozz.digital;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/velozz.digital/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/velozz.digital/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket specific settings
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
    }
}
