[PHP]
; Configurações otimizadas para produção Laravel

; Limites de memória e execução
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; Upload de arquivos
upload_max_filesize = 20M
post_max_size = 25M

; Timezone
date.timezone = UTC

; Erros (em produção, logar mas não mostrar)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php_errors.log

; Session
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

; Security
expose_php = Off
