[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data

; Process manager
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Recycle workers after 500 requests to prevent state corruption
pm.max_requests = 500

; Keep environment variables accessible (replaces the sed fix in Dockerfile)
clear_env = no
