services:
    # Laravel Application
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: production
        container_name: velozz_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./storage:/var/www/storage:delegated
        environment:
            - APP_ENV=production
            - CONTAINER_ROLE=app
        networks:
            - velozz_network
        depends_on:
            - mysql
            - redis

    # Queue Worker
    queue:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: production
        container_name: velozz_queue
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./storage:/var/www/storage:delegated
        environment:
            - APP_ENV=production
            - CONTAINER_ROLE=queue
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        networks:
            - velozz_network
        depends_on:
            - mysql
            - redis

    # Laravel Scheduler
    scheduler:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: production
        container_name: velozz_scheduler
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        environment:
            - APP_ENV=production
            - CONTAINER_ROLE=scheduler
        command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
        networks:
            - velozz_network
        depends_on:
            - mysql
            - redis

    # Laravel Reverb (WebSocket)
    reverb:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: production
        container_name: velozz_reverb
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        environment:
            - APP_ENV=production
            - CONTAINER_ROLE=reverb
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        ports:
            - "8080:8080"
        networks:
            - velozz_network
        depends_on:
            - redis

    # Nginx Web Server
    nginx:
        image: nginx:alpine
        container_name: velozz_nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/sites/:/etc/nginx/sites-available/:ro
            - ./docker/nginx/ssl/:/etc/nginx/ssl/:ro
            - /var/log/nginx:/var/log/nginx
        networks:
            - velozz_network
        depends_on:
            - app

    # MySQL Database
    mysql:
        image: mysql:8.0
        container_name: velozz_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
        volumes:
            - velozz_mysql_data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
        ports:
            - "3306:3306"
        networks:
            - velozz_network
        command: --default-authentication-plugin=mysql_native_password

    # Redis Cache & Queue
    redis:
        image: redis:7-alpine
        container_name: velozz_redis
        restart: unless-stopped
        command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
        volumes:
            - velozz_redis_data:/data
        ports:
            - "6379:6379"
        networks:
            - velozz_network

networks:
    velozz_network:
        driver: bridge

volumes:
    velozz_mysql_data:
        driver: local
    velozz_redis_data:
        driver: local
