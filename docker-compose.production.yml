services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        USER_ID: 1000
        GROUP_ID: 1000
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
        VITE_REVERB_HOST: ${REVERB_HOST}
        VITE_REVERB_PORT: ${REVERB_PORT}
        VITE_REVERB_SCHEME: ${REVERB_SCHEME}
    image: velozz:latest
    container_name: velozz-app
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8081:8081"
    environment:
      # App
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - APP_DOMAIN=${APP_DOMAIN}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - APP_LOCALE=${APP_LOCALE:-en}
      - ASSET_URL=${ASSET_URL}
      - ADMIN_URL=${ADMIN_URL}
      - CLIENT_URL_BASE=${CLIENT_URL_BASE}
      # Logging
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      # Database
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # Redis
      - REDIS_CLIENT=${REDIS_CLIENT:-phpredis}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_CACHE_DB=${REDIS_CACHE_DB:-1}
      - REDIS_QUEUE_DB=${REDIS_QUEUE_DB:-2}
      # Cache & Session
      - CACHE_STORE=${CACHE_STORE:-redis}
      - CACHE_PREFIX=${CACHE_PREFIX:-velozz}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - SESSION_DOMAIN=${SESSION_DOMAIN}
      - SESSION_SECURE_COOKIE=${SESSION_SECURE_COOKIE:-true}
      # Queue
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - QUEUE_FAILED_DRIVER=${QUEUE_FAILED_DRIVER:-database-uuids}
      # Broadcasting (Reverb)
      - BROADCAST_CONNECTION=${BROADCAST_CONNECTION:-reverb}
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=${REVERB_HOST}
      - REVERB_PORT=${REVERB_PORT}
      - REVERB_SCHEME=${REVERB_SCHEME}
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=8081
      # Mail (SES)
      - MAIL_MAILER=${MAIL_MAILER:-ses}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      # Filesystem (S3)
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-s3}
      - FILAMENT_FILESYSTEM_DISK=${FILAMENT_FILESYSTEM_DISK:-public}
      - AWS_BUCKET=${AWS_BUCKET}
      - AWS_URL=${AWS_URL}
      # Meilisearch
      - SCOUT_DRIVER=${SCOUT_DRIVER:-meilisearch}
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-}
      # Multi-Tenancy
      - TENANCY_ENABLED=${TENANCY_ENABLED:-true}
      - TENANCY_DOMAIN=${TENANCY_DOMAIN}
      # Stripe
      - STRIPE_KEY=${STRIPE_KEY}
      - STRIPE_SECRET=${STRIPE_SECRET}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CASHIER_CURRENCY=${CASHIER_CURRENCY:-eur}
      # Z-API WhatsApp
      - ZAPI_BASE_URL=${ZAPI_BASE_URL:-https://api.z-api.io}
      - ZAPI_INSTANCE_ID=${ZAPI_INSTANCE_ID:-}
      - ZAPI_TOKEN=${ZAPI_TOKEN:-}
      - ZAPI_CLIENT_TOKEN=${ZAPI_CLIENT_TOKEN:-}
      - ZAPI_ENABLED=${ZAPI_ENABLED:-false}
      # Meta Graph API
      - METAGRAPH_ENABLED=${METAGRAPH_ENABLED:-false}
      - META_APP_ID=${META_APP_ID:-}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - META_WEBHOOK_VERIFY_TOKEN=${META_WEBHOOK_VERIFY_TOKEN:-}
      # Security
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      # Migrations
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
      # Tenant
      - APP_TENANT_DOMAIN=${APP_TENANT_DOMAIN:-{tenant:slug}.velozz.digital}
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - velozz-network

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: velozz-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - velozz-network

  mysql:
    image: mysql:8.0
    container_name: velozz-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - velozz-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: velozz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - velozz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  meilisearch-data:
    driver: local

networks:
  velozz-network:
    driver: bridge
